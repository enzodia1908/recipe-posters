<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Posters</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FDF8FF; min-height: 100vh; padding: 48px 24px; }
    .header { text-align: center; margin-bottom: 40px; }
    .title { font-size: 28px; font-weight: 700; color: #C0392B; font-family: Georgia, serif; }
    .subtitle { font-size: 13px; color: #A08080; margin-top: 6px; letter-spacing: 1px; }
    .divider { border: none; border-top: 1px solid #F0D8D0; margin: 0 auto 40px; max-width: 480px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; max-width: 800px; margin: 0 auto; }
    .card { background: #fff; border: 0.5px solid #EEE0DC; border-radius: 12px; padding: 18px 20px; text-decoration: none; display: block; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(192,57,43,0.08); border-color: #F0C8C0; }
    .card-tag { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #C0392B; margin-bottom: 8px; }
    .card-title { font-size: 15px; font-weight: 600; color: #2a0e00; font-family: Georgia, serif; line-height: 1.3; margin-bottom: 6px; }
    .card-meta { font-size: 11px; color: #A08080; }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">Recipe Posters</div>
    <div class="subtitle">My personal meal prep collection</div>
  </div>

  <hr class="divider">

  <div class="grid">
    <a class="card" href="recipes/harissa-prawn-bacon-orzo.html">
      <div class="card-tag">Meal Prep</div>
      <div class="card-title">Harissa Prawn + Bacon Orzo</div>
      <div class="card-meta">4 serves · ~50 min · 1 pan</div>
    </a>
  </div>

</body>
</html>
